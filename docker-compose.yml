services:
  mongo:
    image: mongo:7
    container_name: alpaca-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: alpaca
      MONGO_INITDB_ROOT_PASSWORD: alpaca123
      MONGO_INITDB_DATABASE: alpaca
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  mongo-express:
    image: mongo-express:1
    container_name: alpaca-mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: alpaca
      ME_CONFIG_MONGODB_ADMINPASSWORD: alpaca123
      ME_CONFIG_MONGODB_URL: mongodb://alpaca:alpaca123@mongo:27017/
      ME_CONFIG_BASICAUTH: "false"
    depends_on:
      mongo:
        condition: service_healthy

volumes:
  mongo_data:
